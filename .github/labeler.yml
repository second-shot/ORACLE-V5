# Label PRs based on the paths of changed files.
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'
      - 'SECURITY.md'

oracle-docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'oracle/docs/**'

mia:
  - changed-files:
    - any-glob-to-any-file:
      - 'oracle/mia/**'

mia-report:
  - changed-files:
    - any-glob-to-any-file:
      - 'oracle/mia/reports/**'

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/**'
      - 'index.html'
      - '*.html'
      - 'vite.config.js'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

canon:
  - changed-files:
    - any-glob-to-any-file:
      - 'canon/**'

agent:
  - changed-files:
    - any-glob-to-any-file:
      - 'agents/**'
      - 'oracle_agent_api/**'
      - 'agent-room/**'
